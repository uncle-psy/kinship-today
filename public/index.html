<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinship Today</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; color: #2d2a26; overflow: hidden; position: relative; }
  .bg { position: fixed; inset: 0; z-index: -2; background: linear-gradient(135deg, #f8f4f0 0%, #f0e8df 25%, #e8ddd0 50%, #f2ece4 75%, #faf6f2 100%); background-size: 400% 400%; animation: gradientShift 20s ease infinite; }
  @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: -1; animation: float 15s ease-in-out infinite; }
  .orb-1 { width: 400px; height: 400px; background: #c4956a; top: -100px; right: -100px; }
  .orb-2 { width: 350px; height: 350px; background: #8b7355; bottom: -80px; left: -80px; animation-delay: -5s; }
  .orb-3 { width: 250px; height: 250px; background: #d4a574; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
  @keyframes float { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(30px, -20px); } 50% { transform: translate(-20px, 30px); } 75% { transform: translate(20px, 20px); } }
  .container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; max-width: 680px; width: 100%; animation: fadeInUp 1.2s ease-out; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .go-deeper { display: inline-flex; align-items: center; gap: 8px; padding: 10px 28px; border: 1.5px solid rgba(139, 115, 85, 0.3); border-radius: 100px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); color: #6b5a45; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.4s ease; margin-bottom: 3rem; }
  .go-deeper:hover { background: rgba(255, 255, 255, 0.7); border-color: rgba(139, 115, 85, 0.5); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139, 115, 85, 0.12); }
  .go-deeper svg { width: 16px; height: 16px; transition: transform 0.3s ease; }
  .go-deeper:hover svg { transform: translateY(2px); }
  .intro { margin-bottom: 2.5rem; }
  .intro h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 400; line-height: 1.5; color: #3d362e; }
  .intro h1 .name { font-weight: 600; font-style: italic; color: #6b5a45; }
  .intro p { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 300; line-height: 1.7; color: #5a5148; margin-top: 1.5rem; }
  .count-line { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; color: #7a6e62; margin-bottom: 2.5rem; line-height: 1.7; }
  .count-line .number { font-weight: 600; color: #6b5a45; font-size: 1.35rem; }
  .count-line .subtle { font-style: italic; opacity: 0.85; }
  .prompt { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; font-style: italic; color: #4a4039; margin-bottom: 2rem; line-height: 1.5; }
  .chat-input-wrapper { width: 100%; max-width: 560px; position: relative; }
  .chat-input { width: 100%; padding: 18px 60px 18px 24px; border: 1.5px solid rgba(139, 115, 85, 0.25); border-radius: 100px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 300; color: #3d362e; outline: none; transition: all 0.3s ease; }
  .chat-input::placeholder { color: #a89a8c; font-style: italic; }
  .chat-input:focus { border-color: rgba(139, 115, 85, 0.5); background: rgba(255, 255, 255, 0.85); box-shadow: 0 4px 24px rgba(139, 115, 85, 0.1); }
  .voice-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg, #8b7355, #a6896b); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
  .voice-btn:hover { background: linear-gradient(135deg, #7a6348, #96795b); transform: translateY(-50%) scale(1.05); box-shadow: 0 4px 16px rgba(139, 115, 85, 0.25); }
  .voice-btn svg { width: 18px; height: 18px; }
  @media (max-width: 600px) { .intro h1 { font-size: 1.4rem; } .intro p { font-size: 1.15rem; } .prompt { font-size: 1.25rem; } .count-line { font-size: 1.05rem; } }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="container">
    <button class="go-deeper">Go Deeper
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
    </button>
    <div class="intro">
      <h1>I’m <span class="name">Kaytee May</span>, the spirit of Kinship Today.</h1>
      <p>I’m here to help you deeply connect with yourself,<br>with others, and with the cosmos as a whole.</p>
    </div>
    <div class="count-line">So far, I’ve deepened these connections for <span class="number">2,847</span> people —<br><span class="subtle">some like you, some very different.</span></div>
    <div class="prompt">Who would you like to connect with<br>on a deeper level today?</div>
    <div class="chat-input-wrapper">
      <input type="text" class="chat-input" placeholder="Tell me what’s on your mind...">
      <button class="voice-btn" title="Speak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
  </div>
</body>
</html>
